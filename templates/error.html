<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Code}} — FB Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cause:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cause', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0e1a;
    overflow: hidden;
    position: relative;
  }

  /* Background glow blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .blob-1 {
    width: 500px; height: 500px;
    background: rgba(59,130,246,0.12);
    top: -150px; left: -150px;
  }
  .blob-2 {
    width: 400px; height: 400px;
    background: rgba(99,102,241,0.1);
    bottom: -100px; right: -100px;
  }
  .blob-3 {
    width: 300px; height: 300px;
    background: rgba(59,130,246,0.06);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Grid lines overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(22,27,39,0.85);
    border: 1px solid rgba(59,130,246,0.15);
    border-radius: 24px;
    padding: 56px 48px;
    max-width: 480px;
    width: 90%;
    text-align: center;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 64px rgba(0,0,0,0.4);
  }

  /* Meta logo */
  .meta-logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }

  /* Error code */
  .error-code {
    font-size: 96px;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -4px;
    margin-bottom: 20px;
    position: relative;
  }

  .error-code::after {
    content: attr(data-code);
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: blur(20px);
    opacity: 0.4;
    z-index: -1;
  }

  /* Divider */
  .divider {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .error-title {
    font-size: 22px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 10px;
  }

  .error-desc {
    font-size: 14px;
    color: #64748b;
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-home:hover { opacity: 0.88; transform: translateY(-1px); }

  /* Icon ring */
  .icon-ring {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.18);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .icon-ring svg { color: #3b82f6; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .icon-ring { animation: float 3s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <!-- Meta logo -->
    <div class="meta-logo">
      <svg viewBox="-14 20 228 93" width="44" height="28" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="err-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
        </defs>
        <path stroke="url(#err-grad)" stroke-width="23" stroke-linecap="round" fill="none"
          d="M100,66.5 C95,46 75,33 52,33 C25,33 4,48 4,66.5 C4,85 25,100 52,100 C75,100 95,87 100,66.5 C105,46 125,33 148,33 C175,33 196,48 196,66.5 C196,85 175,100 148,100 C125,100 105,87 100,66.5 Z"/>
      </svg>
    </div>

    <!-- Icon -->
    <div class="icon-ring">
      {{if eq .Code 404}}
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {{else if eq .Code 403}}
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      {{else}}
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      {{end}}
    </div>

    <!-- Code -->
    <div class="error-code" data-code="{{.Code}}">{{.Code}}</div>
    <div class="divider"></div>

    <div class="error-title">{{.Title}}</div>
    <div class="error-desc">{{.Message}}</div>

    <a href="/" class="btn-home">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Kembali ke Dashboard
    </a>
  </div>
</body>
</html>
